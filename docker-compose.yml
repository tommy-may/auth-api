services:
  # Node.js application for production
  app:
    container_name: node-app
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    env_file: '.env.production'
    ports:
      - '${PORT:-3000}:3000'
    networks:
      - app-network
    volumes:
      # Mount logs directory for production logging
      - logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => { process.exit(1) })",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - mongodb
  # Database MongoDB
  mongodb:
    container_name: mongodb
    image: mongodb/mongodb-community-server:latest
    ports:
      - '${DB_PORT:-27017}:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_NAME}
    networks:
      - app-network
    volumes:
      - mongodb:/data/db
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  logs:
    # external: true
  mongodb:
    # external: true
